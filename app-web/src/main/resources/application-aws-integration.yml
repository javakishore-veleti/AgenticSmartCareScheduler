# AWS Integration profile — values populated from .env.aws-integration
# Generated by AWS-013-Generate-Env-File GitHub Action
# Start with: npm run start:aws-integration

spring:
  datasource:
    url: jdbc:h2:mem:agenticcare;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS smartcare_admin_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

smartcare:
  messaging:
    provider: aws-sqs
    broker-url: ""  # not used — SQS replaces HTTP broker
  aws:
    region: ${AWS_REGION:us-east-1}
    s3:
      dataset-bucket: ${S3_DATASET_BUCKET:}
    sqs:
      workflow-events-queue-url: ${SQS_WORKFLOW_EVENTS:}
      outreach-results-queue-url: ${SQS_OUTREACH_RESULTS:}
      admin-alerts-queue-url: ${SQS_ADMIN_ALERTS:}
    step-functions:
      state-machine-arn: ${STEP_FUNCTIONS_ARN:}
    eventbridge:
      bus-name: ${EVENTBRIDGE_BUS:}
    opensearch:
      endpoint: ${OPENSEARCH_ENDPOINT:}
    lambda:
      pca-arn: ${LAMBDA_PCA_ARN:}
      coa-arn: ${LAMBDA_COA_ARN:}
    vpc:
      id: ${VPC_ID:}
    cloudwatch:
      dashboard-url: ${CLOUDWATCH_DASHBOARD:}
      alarm-topic-arn: ${CLOUDWATCH_ALARM_TOPIC:}
    opensearch:
      master-password: ${OPENSEARCH_MASTER_PASSWORD:}
    rds:
      master-password: ${RDS_MASTER_PASSWORD:}
    redis:
      auth-token: ${REDIS_AUTH_TOKEN:}
  security:
    aes-encryption-key: ${AES_ENCRYPTION_KEY:}
    encryption-key: ${ENCRYPTION_KEY:}
    jwt-signing-key: ${JWT_SIGNING_KEY:}
