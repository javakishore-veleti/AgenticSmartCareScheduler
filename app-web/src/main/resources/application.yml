spring:
  application:
    name: AgenticSmartCareScheduler
  datasource:
    url: jdbc:h2:mem:agenticcare
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

feature:
  toggles:
    workflow:
      engines:
        temporal:
          enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
