name: "AWS-001: Validate VPC"
on:
  workflow_dispatch:
  workflow_call:
    outputs:
      vpc_valid:
        description: "Whether the VPC is valid"
        value: ${{ jobs.validate.outputs.vpc_valid }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      vpc_valid: ${{ steps.check.outputs.valid }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Validate VPC
        id: check
        run: |
          VPC_ID="${{ secrets.AWS_VPC_ID }}"
          if [ -z "$VPC_ID" ]; then
            echo "ERROR: AWS_VPC_ID secret not set"
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "Checking VPC: $VPC_ID"
          VPC_STATE=$(aws ec2 describe-vpcs --vpc-ids "$VPC_ID" --query 'Vpcs[0].State' --output text 2>/dev/null || echo "NOT_FOUND")
          if [ "$VPC_STATE" = "available" ]; then
            echo "VPC $VPC_ID is valid and available"
            echo "valid=true" >> $GITHUB_OUTPUT

            # Print VPC details
            aws ec2 describe-vpcs --vpc-ids "$VPC_ID" --output table
            echo ""
            echo "Subnets:"
            aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --query 'Subnets[*].[SubnetId,AvailabilityZone,CidrBlock]' --output table
          else
            echo "ERROR: VPC $VPC_ID not found or not available (state: $VPC_STATE)"
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi
