name: "AWS-015: Build & Push Docker"
on:
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to build (all, app-web, app-message-broker)"
        required: true
        default: "all"
        type: choice
        options: [all, app-web, app-message-broker]
  workflow_call:
    inputs:
      service:
        description: "Which service to build"
        type: string
        default: "all"

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AGENTIC_SCS_CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTIC_SCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }} \
            | docker login --username AWS --password-stdin \
              $(aws sts get-caller-identity --query Account --output text).dkr.ecr.${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}.amazonaws.com

      - name: Get ECR Repo URIs from CloudFormation
        id: ecr
        run: |
          APP_WEB_REPO=$(aws cloudformation describe-stacks --stack-name smartcare-ecr \
            --query "Stacks[0].Outputs[?OutputKey=='AppWebRepoUri'].OutputValue" --output text)
          BROKER_REPO=$(aws cloudformation describe-stacks --stack-name smartcare-ecr \
            --query "Stacks[0].Outputs[?OutputKey=='BrokerRepoUri'].OutputValue" --output text)
          echo "app_web_repo=$APP_WEB_REPO" >> "$GITHUB_OUTPUT"
          echo "broker_repo=$BROKER_REPO" >> "$GITHUB_OUTPUT"

      - name: Build & Push app-web
        if: inputs.service == 'all' || inputs.service == 'app-web'
        run: |
          REPO="${{ steps.ecr.outputs.app_web_repo }}"
          docker build -f app-web/Dockerfile -t "$REPO:${{ github.sha }}" -t "$REPO:latest" .
          docker push "$REPO:${{ github.sha }}"
          docker push "$REPO:latest"

      - name: Build & Push app-message-broker
        if: inputs.service == 'all' || inputs.service == 'app-message-broker'
        run: |
          REPO="${{ steps.ecr.outputs.broker_repo }}"
          docker build -f app-extensions/app-message-broker/Dockerfile -t "$REPO:${{ github.sha }}" -t "$REPO:latest" .
          docker push "$REPO:${{ github.sha }}"
          docker push "$REPO:latest"
