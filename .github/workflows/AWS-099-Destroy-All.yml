name: "AWS-099: Destroy All"
on:
  workflow_dispatch:
    inputs:
      destroy_containers:
        description: "Destroy Container Services (App Runner / ECS)"
        type: boolean
        default: true
      destroy_cloudwatch:
        description: "Destroy CloudWatch Monitoring"
        type: boolean
        default: true
      destroy_connect:
        description: "Destroy Connect"
        type: boolean
        default: true
      destroy_healthlake:
        description: "Destroy HealthLake"
        type: boolean
        default: true
      destroy_stepfunctions:
        description: "Destroy Step Functions"
        type: boolean
        default: true
      destroy_lambda:
        description: "Destroy Lambda Agents"
        type: boolean
        default: true
      destroy_bedrock:
        description: "Destroy Bedrock Agent"
        type: boolean
        default: true
      destroy_opensearch:
        description: "Destroy OpenSearch"
        type: boolean
        default: true
      destroy_eventbridge:
        description: "Destroy EventBridge"
        type: boolean
        default: true
      destroy_sqs:
        description: "Destroy SQS Queues"
        type: boolean
        default: true
      destroy_sns:
        description: "Destroy SNS Topics"
        type: boolean
        default: true
      destroy_rds:
        description: "Destroy RDS PostgreSQL"
        type: boolean
        default: true
      destroy_ecr:
        description: "Destroy ECR Repositories"
        type: boolean
        default: true
      destroy_nat_endpoints:
        description: "Destroy NAT Gateway + VPC Endpoints"
        type: boolean
        default: true
      destroy_s3:
        description: "Destroy S3 Bucket"
        type: boolean
        default: true
      destroy_vpc:
        description: "Destroy VPC (only if created by AWS-001)"
        type: boolean
        default: true

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AGENTIC_SCS_CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTIC_SCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}

      - name: Destroy stacks (reverse dependency order)
        run: |
          ENV="dev"
          destroy_stack() {
            local name=$1
            echo "Destroying $name..."
            aws cloudformation delete-stack --stack-name "$name" 2>/dev/null || echo "  Stack $name not found"
            aws cloudformation wait stack-delete-complete --stack-name "$name" 2>/dev/null || true
            echo "  Done: $name"
          }

          # 1. Container services
          if [ "${{ inputs.destroy_containers }}" = "true" ]; then
            destroy_stack "smartcare-apprunner"
            destroy_stack "smartcare-ecs-fargate"
            destroy_stack "smartcare-ecs-fargate-spot"
          fi

          # 2. Monitoring + managed services
          [ "${{ inputs.destroy_cloudwatch }}" = "true" ] && destroy_stack "smartcare-cloudwatch"
          [ "${{ inputs.destroy_connect }}" = "true" ] && destroy_stack "smartcare-connect"
          [ "${{ inputs.destroy_healthlake }}" = "true" ] && destroy_stack "smartcare-healthlake"

          # 3. Orchestration
          [ "${{ inputs.destroy_stepfunctions }}" = "true" ] && destroy_stack "smartcare-step-functions"

          # 4. Compute
          [ "${{ inputs.destroy_lambda }}" = "true" ] && destroy_stack "smartcare-lambda-agents"
          [ "${{ inputs.destroy_bedrock }}" = "true" ] && destroy_stack "smartcare-bedrock-agent"

          # 5. Data
          [ "${{ inputs.destroy_opensearch }}" = "true" ] && destroy_stack "smartcare-opensearch"

          # 6. Messaging
          [ "${{ inputs.destroy_eventbridge }}" = "true" ] && destroy_stack "smartcare-eventbridge"
          [ "${{ inputs.destroy_sqs }}" = "true" ] && destroy_stack "smartcare-sqs-queues"
          [ "${{ inputs.destroy_sns }}" = "true" ] && destroy_stack "smartcare-sns-topics"

          # 7. RDS
          [ "${{ inputs.destroy_rds }}" = "true" ] && destroy_stack "smartcare-rds"

          # 8. ECR — force-delete repos first (CFN can't delete repos with images)
          if [ "${{ inputs.destroy_ecr }}" = "true" ]; then
            echo "Force-deleting ECR repos (clearing images)..."
            aws ecr delete-repository --repository-name "smartcare-app-web-${ENV}" --force 2>/dev/null || true
            aws ecr delete-repository --repository-name "smartcare-app-message-broker-${ENV}" --force 2>/dev/null || true
            destroy_stack "smartcare-ecr"
          fi

          # 9. NAT + VPC Endpoints
          [ "${{ inputs.destroy_nat_endpoints }}" = "true" ] && destroy_stack "smartcare-nat-vpc-endpoints"

          # 10. S3 — empty bucket first
          if [ "${{ inputs.destroy_s3 }}" = "true" ]; then
            BUCKET=$(aws cloudformation describe-stacks --stack-name smartcare-s3-bucket \
              --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' --output text 2>/dev/null || echo "")
            if [ -n "$BUCKET" ] && [ "$BUCKET" != "None" ]; then
              echo "Emptying S3 bucket $BUCKET..."
              aws s3 rm "s3://$BUCKET" --recursive 2>/dev/null || true
            fi
            destroy_stack "smartcare-s3-bucket"
          fi

          # 11. VPC
          [ "${{ inputs.destroy_vpc }}" = "true" ] && destroy_stack "smartcare-vpc"

          echo ""
          echo "All selected stacks destroyed."
