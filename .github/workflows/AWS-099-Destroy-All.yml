name: "AWS-099: Destroy All"
on:
  workflow_dispatch:
    inputs:
      destroy_containers:
        description: "Destroy Container Services (App Runner / ECS)"
        type: boolean
        default: true
      destroy_cloudwatch:
        description: "Destroy CloudWatch Monitoring"
        type: boolean
        default: true
      destroy_connect:
        description: "Destroy Connect"
        type: boolean
        default: true
      destroy_healthlake:
        description: "Destroy HealthLake"
        type: boolean
        default: true
      destroy_stepfunctions:
        description: "Destroy Step Functions"
        type: boolean
        default: true
      destroy_lambda:
        description: "Destroy Lambda Agents"
        type: boolean
        default: true
      destroy_bedrock:
        description: "Destroy Bedrock Agent"
        type: boolean
        default: true
      destroy_opensearch:
        description: "Destroy OpenSearch"
        type: boolean
        default: true
      destroy_eventbridge:
        description: "Destroy EventBridge"
        type: boolean
        default: true
      destroy_sqs:
        description: "Destroy SQS Queues"
        type: boolean
        default: true
      destroy_sns:
        description: "Destroy SNS Topics"
        type: boolean
        default: true
      destroy_rds:
        description: "Destroy RDS PostgreSQL"
        type: boolean
        default: true
      destroy_ecr:
        description: "Destroy ECR Repositories"
        type: boolean
        default: true
      destroy_nat_endpoints:
        description: "Destroy NAT Gateway + VPC Endpoints"
        type: boolean
        default: true
      destroy_s3:
        description: "Destroy S3 Bucket"
        type: boolean
        default: true
      destroy_vpc:
        description: "Destroy VPC (only if created by AWS-001)"
        type: boolean
        default: true

# Destroy in waves — each wave runs in parallel, waves run sequentially.
# Wave 1: top-level services (containers, cloudwatch, connect, healthlake, bedrock, opensearch)
# Wave 2: orchestration + compute (stepfunctions, lambda)
# Wave 3: messaging (eventbridge, sqs, sns)
# Wave 4: data infra (rds, ecr)
# Wave 5: networking (nat, s3, vpc)

jobs:
  # === Wave 1: Top-level (no dependents) — all parallel ===
  destroy-containers:
    if: ${{ inputs.destroy_containers }}
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AGENTIC_SCS_CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTIC_SCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}
      - name: Destroy container stacks
        run: |
          for stack in smartcare-apprunner smartcare-ecs-fargate smartcare-ecs-fargate-spot; do
            aws cloudformation delete-stack --stack-name "$stack" 2>/dev/null || true
          done
          for stack in smartcare-apprunner smartcare-ecs-fargate smartcare-ecs-fargate-spot; do
            aws cloudformation wait stack-delete-complete --stack-name "$stack" 2>/dev/null || true
          done
          echo "Done: containers"

  destroy-cloudwatch:
    if: ${{ inputs.destroy_cloudwatch }}
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AGENTIC_SCS_CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTIC_SCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}
      - run: |
          aws cloudformation delete-stack --stack-name smartcare-cloudwatch 2>/dev/null || true
          aws cloudformation wait stack-delete-complete --stack-name smartcare-cloudwatch 2>/dev/null || true

  destroy-managed:
    if: ${{ inputs.destroy_connect || inputs.destroy_healthlake || inputs.destroy_bedrock || inputs.destroy_opensearch }}
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AGENTIC_SCS_CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTIC_SCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}
      - name: Destroy managed services (parallel deletes, then wait)
        run: |
          [ "${{ inputs.destroy_connect }}" = "true" ] && aws cloudformation delete-stack --stack-name smartcare-connect 2>/dev/null || true
          [ "${{ inputs.destroy_healthlake }}" = "true" ] && aws cloudformation delete-stack --stack-name smartcare-healthlake 2>/dev/null || true
          [ "${{ inputs.destroy_bedrock }}" = "true" ] && aws cloudformation delete-stack --stack-name smartcare-bedrock-agent 2>/dev/null || true
          [ "${{ inputs.destroy_opensearch }}" = "true" ] && aws cloudformation delete-stack --stack-name smartcare-opensearch 2>/dev/null || true
          [ "${{ inputs.destroy_connect }}" = "true" ] && aws cloudformation wait stack-delete-complete --stack-name smartcare-connect 2>/dev/null || true
          [ "${{ inputs.destroy_healthlake }}" = "true" ] && aws cloudformation wait stack-delete-complete --stack-name smartcare-healthlake 2>/dev/null || true
          [ "${{ inputs.destroy_bedrock }}" = "true" ] && aws cloudformation wait stack-delete-complete --stack-name smartcare-bedrock-agent 2>/dev/null || true
          [ "${{ inputs.destroy_opensearch }}" = "true" ] && aws cloudformation wait stack-delete-complete --stack-name smartcare-opensearch 2>/dev/null || true
          echo "Done: managed services"

  # === Wave 2: Orchestration + compute (needs wave 1 done) ===
  destroy-orchestration:
    needs: [destroy-containers, destroy-cloudwatch]
    if: ${{ always() && (inputs.destroy_stepfunctions || inputs.destroy_lambda) }}
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AGENTIC_SCS_CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTIC_SCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}
      - run: |
          [ "${{ inputs.destroy_stepfunctions }}" = "true" ] && aws cloudformation delete-stack --stack-name smartcare-step-functions 2>/dev/null || true
          [ "${{ inputs.destroy_lambda }}" = "true" ] && aws cloudformation delete-stack --stack-name smartcare-lambda-agents 2>/dev/null || true
          [ "${{ inputs.destroy_stepfunctions }}" = "true" ] && aws cloudformation wait stack-delete-complete --stack-name smartcare-step-functions 2>/dev/null || true
          [ "${{ inputs.destroy_lambda }}" = "true" ] && aws cloudformation wait stack-delete-complete --stack-name smartcare-lambda-agents 2>/dev/null || true
          echo "Done: orchestration + compute"

  # === Wave 3: Messaging (needs orchestration done) ===
  destroy-messaging:
    needs: [destroy-orchestration]
    if: ${{ always() && (inputs.destroy_eventbridge || inputs.destroy_sqs || inputs.destroy_sns) }}
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AGENTIC_SCS_CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTIC_SCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}
      - run: |
          [ "${{ inputs.destroy_eventbridge }}" = "true" ] && aws cloudformation delete-stack --stack-name smartcare-eventbridge 2>/dev/null || true
          [ "${{ inputs.destroy_eventbridge }}" = "true" ] && aws cloudformation wait stack-delete-complete --stack-name smartcare-eventbridge 2>/dev/null || true
          [ "${{ inputs.destroy_sqs }}" = "true" ] && aws cloudformation delete-stack --stack-name smartcare-sqs-queues 2>/dev/null || true
          [ "${{ inputs.destroy_sqs }}" = "true" ] && aws cloudformation wait stack-delete-complete --stack-name smartcare-sqs-queues 2>/dev/null || true
          [ "${{ inputs.destroy_sns }}" = "true" ] && aws cloudformation delete-stack --stack-name smartcare-sns-topics 2>/dev/null || true
          [ "${{ inputs.destroy_sns }}" = "true" ] && aws cloudformation wait stack-delete-complete --stack-name smartcare-sns-topics 2>/dev/null || true
          echo "Done: messaging"

  # === Wave 4: Data infra (needs containers + messaging done) ===
  destroy-data-infra:
    needs: [destroy-containers, destroy-messaging]
    if: ${{ always() && (inputs.destroy_rds || inputs.destroy_ecr) }}
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AGENTIC_SCS_CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTIC_SCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}
      - name: Destroy RDS + ECR
        run: |
          ENV="dev"
          # RDS
          [ "${{ inputs.destroy_rds }}" = "true" ] && aws cloudformation delete-stack --stack-name smartcare-rds 2>/dev/null || true

          # ECR — force-delete repos first (CFN can't delete repos with images)
          if [ "${{ inputs.destroy_ecr }}" = "true" ]; then
            echo "Force-deleting ECR repos..."
            aws ecr delete-repository --repository-name "smartcare-app-web-${ENV}" --force 2>/dev/null || true
            aws ecr delete-repository --repository-name "smartcare-app-message-broker-${ENV}" --force 2>/dev/null || true
            aws cloudformation delete-stack --stack-name smartcare-ecr 2>/dev/null || true
          fi

          [ "${{ inputs.destroy_rds }}" = "true" ] && aws cloudformation wait stack-delete-complete --stack-name smartcare-rds 2>/dev/null || true
          [ "${{ inputs.destroy_ecr }}" = "true" ] && aws cloudformation wait stack-delete-complete --stack-name smartcare-ecr 2>/dev/null || true
          echo "Done: data infra"

  # === Wave 5: Networking foundation (needs everything above) ===
  destroy-foundation:
    needs: [destroy-data-infra, destroy-managed, destroy-messaging]
    if: ${{ always() && (inputs.destroy_nat_endpoints || inputs.destroy_s3 || inputs.destroy_vpc) }}
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AGENTIC_SCS_CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTIC_SCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}
      - name: Destroy NAT, S3, VPC
        run: |
          # NAT + VPC Endpoints
          [ "${{ inputs.destroy_nat_endpoints }}" = "true" ] && aws cloudformation delete-stack --stack-name smartcare-nat-vpc-endpoints 2>/dev/null || true
          [ "${{ inputs.destroy_nat_endpoints }}" = "true" ] && aws cloudformation wait stack-delete-complete --stack-name smartcare-nat-vpc-endpoints 2>/dev/null || true

          # S3 — empty bucket first
          if [ "${{ inputs.destroy_s3 }}" = "true" ]; then
            BUCKET=$(aws cloudformation describe-stacks --stack-name smartcare-s3-bucket \
              --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' --output text 2>/dev/null || echo "")
            if [ -n "$BUCKET" ] && [ "$BUCKET" != "None" ]; then
              echo "Emptying S3 bucket $BUCKET..."
              aws s3 rm "s3://$BUCKET" --recursive 2>/dev/null || true
            fi
            aws cloudformation delete-stack --stack-name smartcare-s3-bucket 2>/dev/null || true
            aws cloudformation wait stack-delete-complete --stack-name smartcare-s3-bucket 2>/dev/null || true
          fi

          # VPC (last — everything else depends on it)
          [ "${{ inputs.destroy_vpc }}" = "true" ] && aws cloudformation delete-stack --stack-name smartcare-vpc 2>/dev/null || true
          [ "${{ inputs.destroy_vpc }}" = "true" ] && aws cloudformation wait stack-delete-complete --stack-name smartcare-vpc 2>/dev/null || true

          echo "Done: foundation"
