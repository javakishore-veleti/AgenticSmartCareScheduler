name: "AWS-001: Destroy VPC"
on:
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AGENTIC_SCS_CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTIC_SCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}

      - name: Destroy VPC stack
        run: |
          echo "Destroying smartcare-vpc stack..."
          aws cloudformation delete-stack --stack-name "smartcare-vpc" 2>/dev/null || echo "Stack not found"
          aws cloudformation wait stack-delete-complete --stack-name "smartcare-vpc" 2>/dev/null || true
          echo "Done."
