name: "AWS-009: Create Connect Instance"
on:
  workflow_dispatch:
  workflow_call:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AGENTIC_SCS_CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTIC_SCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}

      - name: Deploy Amazon Connect Instance
        run: |
          aws cloudformation deploy \
            --stack-name "smartcare-connect" \
            --template-file infra/cfn-connect.yaml \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset
