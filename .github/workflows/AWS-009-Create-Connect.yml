name: "AWS-009: Create Connect Instance"
on:
  workflow_dispatch:
  workflow_call:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AGENTIC_SCS_CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTIC_SCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}

      - name: Clean up failed stack if exists
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name smartcare-connect \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [[ "$STATUS" == *FAILED* ]] || [[ "$STATUS" == *ROLLBACK_COMPLETE* ]]; then
            echo "Stack in $STATUS state — deleting before re-deploy..."
            aws cloudformation delete-stack --stack-name smartcare-connect
            aws cloudformation wait stack-delete-complete --stack-name smartcare-connect
            echo "Deleted."
          else
            echo "Stack status: $STATUS — proceeding with deploy."
          fi
      - name: Deploy Amazon Connect Instance
        run: |
          aws cloudformation deploy \
            --stack-name "smartcare-connect" \
            --template-file DevOps/AWS/infra/cfn-connect.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
