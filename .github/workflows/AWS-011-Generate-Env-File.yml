name: "AWS-011: Generate Env File"
on:
  workflow_dispatch:
  workflow_call:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Generate .env.aws-integration
        run: |
          REGION="${{ secrets.AWS_REGION || 'us-east-1' }}"
          ENV="dev"

          cat > .env.aws-integration <<EOF
          # Generated by AWS-011-Generate-Env-File — $(date -u)
          AWS_REGION=$REGION
          SMARTCARE_ENV=$ENV

          # S3
          S3_DATASET_BUCKET=$(aws cloudformation describe-stacks --stack-name smartcare-s3-bucket --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' --output text 2>/dev/null || echo "NOT_DEPLOYED")

          # SNS
          SNS_APPOINTMENT_TOPIC=$(aws cloudformation describe-stacks --stack-name smartcare-sns-topics --query 'Stacks[0].Outputs[?OutputKey==`AppointmentEventTopicArn`].OutputValue' --output text 2>/dev/null || echo "NOT_DEPLOYED")
          SNS_OUTREACH_TOPIC=$(aws cloudformation describe-stacks --stack-name smartcare-sns-topics --query 'Stacks[0].Outputs[?OutputKey==`OutreachResultTopicArn`].OutputValue' --output text 2>/dev/null || echo "NOT_DEPLOYED")
          SNS_ADMIN_TOPIC=$(aws cloudformation describe-stacks --stack-name smartcare-sns-topics --query 'Stacks[0].Outputs[?OutputKey==`AdminAlertTopicArn`].OutputValue' --output text 2>/dev/null || echo "NOT_DEPLOYED")

          # SQS
          SQS_WORKFLOW_EVENTS=$(aws cloudformation describe-stacks --stack-name smartcare-sqs-queues --query 'Stacks[0].Outputs[?OutputKey==`WorkflowEventsQueueUrl`].OutputValue' --output text 2>/dev/null || echo "NOT_DEPLOYED")
          SQS_OUTREACH_RESULTS=$(aws cloudformation describe-stacks --stack-name smartcare-sqs-queues --query 'Stacks[0].Outputs[?OutputKey==`OutreachResultsQueueUrl`].OutputValue' --output text 2>/dev/null || echo "NOT_DEPLOYED")
          SQS_ADMIN_ALERTS=$(aws cloudformation describe-stacks --stack-name smartcare-sqs-queues --query 'Stacks[0].Outputs[?OutputKey==`AdminAlertsQueueUrl`].OutputValue' --output text 2>/dev/null || echo "NOT_DEPLOYED")

          # EventBridge
          EVENTBRIDGE_BUS=$(aws cloudformation describe-stacks --stack-name smartcare-eventbridge --query 'Stacks[0].Outputs[?OutputKey==`EventBusName`].OutputValue' --output text 2>/dev/null || echo "NOT_DEPLOYED")

          # OpenSearch
          OPENSEARCH_ENDPOINT=$(aws cloudformation describe-stacks --stack-name smartcare-opensearch --query 'Stacks[0].Outputs[?OutputKey==`DomainEndpoint`].OutputValue' --output text 2>/dev/null || echo "NOT_DEPLOYED")

          # Step Functions
          STEP_FUNCTIONS_ARN=$(aws cloudformation describe-stacks --stack-name smartcare-step-functions --query 'Stacks[0].Outputs[?OutputKey==`StateMachineArn`].OutputValue' --output text 2>/dev/null || echo "NOT_DEPLOYED")

          # Lambda ARNs
          LAMBDA_PCA_ARN=$(aws cloudformation describe-stacks --stack-name smartcare-lambda-agents --query 'Stacks[0].Outputs[?OutputKey==`PCAFunctionArn`].OutputValue' --output text 2>/dev/null || echo "NOT_DEPLOYED")
          LAMBDA_COA_ARN=$(aws cloudformation describe-stacks --stack-name smartcare-lambda-agents --query 'Stacks[0].Outputs[?OutputKey==`COAFunctionArn`].OutputValue' --output text 2>/dev/null || echo "NOT_DEPLOYED")
          EOF

          echo "Generated .env.aws-integration"
          cat .env.aws-integration

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: env-aws-integration
          path: .env.aws-integration
