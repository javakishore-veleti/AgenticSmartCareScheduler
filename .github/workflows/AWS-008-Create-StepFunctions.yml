name: "AWS-008: Create Step Functions"
on:
  workflow_dispatch:
  workflow_call:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AGENTIC_SCS_CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTIC_SCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}

      - name: Deploy Step Functions State Machine
        run: |
          aws cloudformation deploy \
            --stack-name "smartcare-step-functions" \
            --template-file infra/cfn-step-functions.yaml \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset
