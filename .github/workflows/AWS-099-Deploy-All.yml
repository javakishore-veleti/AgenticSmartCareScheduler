name: "AWS-099: Deploy All"
on:
  workflow_dispatch:
    inputs:
      vpc_mode:
        description: "VPC source"
        type: choice
        required: true
        default: "create_new"
        options:
          - create_new
          - use_existing
          - skip
      create_s3:
        description: "Create S3 Bucket"
        type: boolean
        default: true
      create_sns:
        description: "Create SNS Topics"
        type: boolean
        default: true
      create_sqs:
        description: "Create SQS Queues"
        type: boolean
        default: true
      create_eventbridge:
        description: "Create EventBridge"
        type: boolean
        default: true
      create_lambda:
        description: "Create Lambda Agents"
        type: boolean
        default: true
      create_stepfunctions:
        description: "Create Step Functions"
        type: boolean
        default: true
      create_cloudwatch:
        description: "Create CloudWatch Monitoring"
        type: boolean
        default: true
      # --- Container deployment ---
      create_ecr:
        description: "Create ECR Repositories"
        type: boolean
        default: true
      create_nat_endpoints:
        description: "Create NAT Gateway + VPC Endpoints (required for containers)"
        type: boolean
        default: true
      create_rds:
        description: "Create RDS PostgreSQL"
        type: boolean
        default: true
      build_docker:
        description: "Build & Push Docker Images"
        type: boolean
        default: true
      deploy_containers:
        description: "Deploy Containers"
        type: boolean
        default: true
      container_target:
        description: "Container deployment target"
        type: choice
        default: "apprunner"
        options:
          - apprunner
          - ecs-fargate
          - ecs-fargate-spot
      generate_env:
        description: "Generate .env file"
        type: boolean
        default: true
      # --- Slow / expensive services — skipped by default ---
      create_opensearch:
        description: "Create OpenSearch (~20 min provision time)"
        type: boolean
        default: false
      create_bedrock:
        description: "Create Bedrock Agent"
        type: boolean
        default: false
      create_connect:
        description: "Create Connect"
        type: boolean
        default: false
      create_healthlake:
        description: "Create HealthLake"
        type: boolean
        default: false

jobs:
  # --- VPC ---
  vpc:
    if: ${{ inputs.vpc_mode != 'skip' }}
    uses: ./.github/workflows/AWS-001-Validate-VPC.yml
    with:
      vpc_mode: ${{ inputs.vpc_mode }}
    secrets: inherit

  # --- Core messaging ---
  create-s3:
    needs: [vpc]
    if: ${{ always() && inputs.create_s3 }}
    uses: ./.github/workflows/AWS-002-Create-S3-Bucket.yml
    secrets: inherit

  create-sns:
    if: ${{ inputs.create_sns }}
    uses: ./.github/workflows/AWS-002-Create-SNS-Topics.yml
    secrets: inherit

  create-sqs:
    needs: [create-sns]
    if: ${{ always() && inputs.create_sqs }}
    uses: ./.github/workflows/AWS-003-Create-SQS-Queues.yml
    secrets: inherit

  create-eventbridge:
    needs: [create-sqs]
    if: ${{ always() && inputs.create_eventbridge }}
    uses: ./.github/workflows/AWS-004-Create-EventBridge.yml
    secrets: inherit

  # --- Lambda agents + orchestration ---
  create-lambda:
    needs: [create-sns, create-eventbridge]
    if: ${{ always() && inputs.create_lambda }}
    uses: ./.github/workflows/AWS-007-Create-Lambda-Agents.yml
    secrets: inherit

  create-stepfunctions:
    needs: [create-lambda]
    if: ${{ always() && inputs.create_stepfunctions }}
    uses: ./.github/workflows/AWS-008-Create-StepFunctions.yml
    secrets: inherit

  create-cloudwatch:
    needs: [create-lambda, create-stepfunctions]
    if: ${{ always() && inputs.create_cloudwatch }}
    uses: ./.github/workflows/AWS-012-Create-CloudWatch.yml
    secrets: inherit

  # --- Container infrastructure (runs after core services) ---
  create-nat-endpoints:
    needs: [vpc]
    if: ${{ always() && inputs.create_nat_endpoints }}
    uses: ./.github/workflows/AWS-016-Create-NAT-VPC-Endpoints.yml
    secrets: inherit

  create-rds:
    needs: [create-nat-endpoints]
    if: ${{ always() && inputs.create_rds }}
    uses: ./.github/workflows/AWS-017-Create-RDS.yml
    secrets: inherit

  create-ecr:
    needs: [create-lambda]
    if: ${{ always() && inputs.create_ecr }}
    uses: ./.github/workflows/AWS-014-Create-ECR.yml
    secrets: inherit

  build-docker:
    needs: [create-ecr]
    if: ${{ inputs.build_docker && needs.create-ecr.result == 'success' }}
    uses: ./.github/workflows/AWS-015-Build-Push-Docker.yml
    secrets: inherit

  deploy-containers:
    needs: [create-rds, build-docker]
    if: ${{ inputs.deploy_containers && needs.build-docker.result == 'success' }}
    uses: ./.github/workflows/AWS-018-Deploy-Containers.yml
    with:
      container_target: ${{ inputs.container_target }}
    secrets: inherit

  # --- Slow / expensive (default off) ---
  create-opensearch:
    needs: [vpc]
    if: ${{ always() && inputs.create_opensearch }}
    uses: ./.github/workflows/AWS-006-Create-OpenSearch.yml
    with:
      vpc_id: ${{ needs.vpc.outputs.vpc_id }}
    secrets: inherit

  create-bedrock:
    if: ${{ inputs.create_bedrock }}
    uses: ./.github/workflows/AWS-006-Create-Bedrock-Agent.yml
    secrets: inherit

  create-connect:
    if: ${{ inputs.create_connect }}
    uses: ./.github/workflows/AWS-009-Create-Connect.yml
    secrets: inherit

  create-healthlake:
    if: ${{ inputs.create_healthlake }}
    uses: ./.github/workflows/AWS-010-Create-HealthLake.yml
    secrets: inherit

  # --- Generate env file (runs last) ---
  generate-env:
    needs: [create-s3, create-sns, create-sqs, create-eventbridge, create-lambda, create-stepfunctions, create-cloudwatch, deploy-containers]
    if: ${{ always() && inputs.generate_env }}
    uses: ./.github/workflows/AWS-013-Generate-Env-File.yml
    secrets: inherit
