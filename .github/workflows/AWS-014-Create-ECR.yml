name: "AWS-014: Create ECR"
on:
  workflow_dispatch:
  workflow_call:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AGENTIC_SCS_CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTIC_SCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}

      - name: Clean up stale stack and orphaned repos
        run: |
          ENV="dev"
          STATUS=$(aws cloudformation describe-stacks --stack-name smartcare-ecr \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Stack status: $STATUS"

          # Delete stack if in ANY non-complete state (FAILED, ROLLBACK_COMPLETE, REVIEW_IN_PROGRESS, DELETE_FAILED, etc.)
          if [ "$STATUS" != "DOES_NOT_EXIST" ] && [ "$STATUS" != "CREATE_COMPLETE" ] && [ "$STATUS" != "UPDATE_COMPLETE" ]; then
            echo "Stack in $STATUS state — deleting..."
            aws cloudformation delete-stack --stack-name smartcare-ecr 2>/dev/null || true
            aws cloudformation wait stack-delete-complete --stack-name smartcare-ecr 2>/dev/null || true
            echo "Stack deleted."
          fi

          # Clean up orphaned ECR repos (may exist outside CloudFormation)
          for repo in "smartcare-app-web-${ENV}" "smartcare-app-message-broker-${ENV}"; do
            if aws ecr describe-repositories --repository-names "$repo" 2>/dev/null >/dev/null; then
              echo "Deleting orphaned ECR repo: $repo"
              aws ecr delete-repository --repository-name "$repo" --force
            fi
          done

      - name: Deploy ECR
        run: |
          aws cloudformation deploy \
            --stack-name "smartcare-ecr" \
            --template-file DevOps/AWS/infra/cfn-ecr.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
