name: "AWS-007: Create Lambda Agents"
on:
  workflow_dispatch:
    inputs:
      agent:
        description: "Which agent to deploy (all, pca, coa, psa, rra, aca)"
        required: true
        default: "all"
        type: choice
        options: [all, pca, coa, psa, rra, aca]
  workflow_call:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AGENTIC_SCS_CLAIMS_PROC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AGENTIC_SCS_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AGENTIC_SCS_AWS_REGION || 'us-east-1' }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Package Lambda functions
        run: |
          AGENTS_DIR="DataManagement/SmartCareAgents"
          DEPLOY_INPUT="${{ inputs.agent || 'all' }}"
          OUTDIR="$(pwd)/lambda-packages"
          mkdir -p "$OUTDIR"

          # Map short names to directory names
          declare -A AGENT_MAP=(
            [pca]="PatientContext"
            [coa]="CommunicationOrchestration"
            [psa]="ProviderScheduling"
            [rra]="ResourceReallocation"
            [aca]="AuditCompliance"
          )

          for short in pca coa psa rra aca; do
            if [ "$DEPLOY_INPUT" = "all" ] || [ "$DEPLOY_INPUT" = "$short" ]; then
              dir="${AGENT_MAP[$short]}"
              echo "Packaging $short ($dir)..."
              STAGING=$(mktemp -d)

              # Copy core agent code + shared
              cp "$AGENTS_DIR/$dir/core/"*.py "$STAGING/"
              cp "$AGENTS_DIR/Shared/core/"*.py "$STAGING/"

              # Copy AWS Lambda wrapper
              cp "$AGENTS_DIR/AWS/$dir/wrapper/"*.py "$STAGING/"

              # Install boto3 (usually in Lambda runtime, but include for safety)
              pip install boto3 -t "$STAGING/" -q

              # Zip
              cd "$STAGING"
              zip -r "$OUTDIR/${short}-lambda.zip" . -q
              cd -
              rm -rf "$STAGING"
              echo "  -> ${short}-lambda.zip"
            fi
          done

      - name: Clean up failed stack if exists
        run: |
          STATUS=$(aws cloudformation describe-stacks --stack-name smartcare-lambda-agents \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          if [[ "$STATUS" == *FAILED* ]] || [[ "$STATUS" == *ROLLBACK_COMPLETE* ]]; then
            echo "Stack in $STATUS state — deleting before re-deploy..."
            aws cloudformation delete-stack --stack-name smartcare-lambda-agents
            aws cloudformation wait stack-delete-complete --stack-name smartcare-lambda-agents
            echo "Deleted."
          else
            echo "Stack status: $STATUS — proceeding with deploy."
          fi

      - name: Deploy Lambda Functions
        run: |
          aws cloudformation deploy \
            --stack-name "smartcare-lambda-agents" \
            --template-file DevOps/AWS/infra/cfn-lambda-agents.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              EncryptionKey=${{ secrets.AGENTIC_SCS_AES_ENCRYPTION_KEY }} \
            --no-fail-on-empty-changeset
