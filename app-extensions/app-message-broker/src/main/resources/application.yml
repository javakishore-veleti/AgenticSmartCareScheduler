spring:
  application:
    name: SmartCare-MessageBroker
  datasource:
    url: jdbc:h2:mem:messagebroker;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS messaging_broker
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

server:
  port: 8081
