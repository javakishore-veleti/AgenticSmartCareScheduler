AWSTemplateFormatVersion: '2010-09-09'
Description: SmartCare - OpenSearch domain for digital twin DT(t)

Parameters:
  Environment:
    Type: String
    Default: dev
  VpcId:
    Type: String
    Description: VPC ID for OpenSearch (optional — leave empty for public access)
    Default: ''
  MasterUserPassword:
    Type: String
    Description: Master user password for OpenSearch fine-grained access control
    NoEcho: true
    Default: ''

Conditions:
  HasMasterPassword: !Not [!Equals [!Ref MasterUserPassword, '']]

Resources:
  OpenSearchDomain:
    Type: AWS::OpenSearchService::Domain
    Properties:
      DomainName: !Sub smartcare-${Environment}
      EngineVersion: OpenSearch_2.11
      ClusterConfig:
        InstanceType: t3.small.search
        InstanceCount: 1
        DedicatedMasterEnabled: false
      EBSOptions:
        EBSEnabled: true
        VolumeType: gp3
        VolumeSize: 20
      AdvancedSecurityOptions:
        !If
          - HasMasterPassword
          - Enabled: true
            InternalUserDatabaseEnabled: true
            MasterUserOptions:
              MasterUserName: smartcare_admin
              MasterUserPassword: !Ref MasterUserPassword
          - !Ref AWS::NoValue
      NodeToNodeEncryptionOptions:
        Enabled: true
      EncryptionAtRestOptions:
        Enabled: true
      DomainEndpointOptions:
        EnforceHTTPS: true
      AccessPolicies:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: '*'
            Action: 'es:*'
            Resource: !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/smartcare-${Environment}/*'
      Tags:
        - Key: Project
          Value: SmartCare

Outputs:
  DomainEndpoint:
    Value: !GetAtt OpenSearchDomain.DomainEndpoint
    Export:
      Name: !Sub smartcare-${Environment}-opensearch-endpoint
  DomainArn:
    Value: !GetAtt OpenSearchDomain.Arn
