AWSTemplateFormatVersion: '2010-09-09'
Description: SmartCare - App Runner services for app-web and message-broker (default deployment target)

Parameters:
  Environment:
    Type: String
    Default: dev
  AppWebImageUri:
    Type: String
    Description: ECR image URI for app-web
  BrokerImageUri:
    Type: String
    Description: ECR image URI for message-broker
  RdsEndpoint:
    Type: String
  RdsPassword:
    Type: String
    NoEcho: true
  SqsWorkflowEventsUrl:
    Type: String
    Default: ''
  SqsOutreachResultsUrl:
    Type: String
    Default: ''
  SqsAdminAlertsUrl:
    Type: String
    Default: ''
  OpenSearchEndpoint:
    Type: String
    Default: ''

Resources:
  AppRunnerECRAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub smartcare-apprunner-ecr-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess
      Tags:
        - Key: Project
          Value: SmartCare
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: AppRunner

  AppRunnerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub smartcare-apprunner-instance-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: tasks.apprunner.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SmartCareAppAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['sqs:*', 'sns:Publish', 's3:GetObject', 's3:ListBucket', 'events:PutEvents', 'es:ESHttp*']
                Resource: '*'
      Tags:
        - Key: Project
          Value: SmartCare
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: AppRunner

  VpcConnector:
    Type: AWS::AppRunner::VpcConnector
    Properties:
      VpcConnectorName: !Sub smartcare-vpc-conn-${Environment}
      Subnets:
        - Fn::ImportValue: !Sub smartcare-${Environment}-private-subnet-1
        - Fn::ImportValue: !Sub smartcare-${Environment}-private-subnet-2
      SecurityGroups:
        - Fn::ImportValue: !Sub smartcare-${Environment}-rds-sg
      Tags:
        - Key: Project
          Value: SmartCare

  AutoScalingConfig:
    Type: AWS::AppRunner::AutoScalingConfiguration
    Properties:
      AutoScalingConfigurationName: !Sub smartcarescaling${Environment}
      MinSize: 3
      MaxSize: 6
      MaxConcurrency: 100

  AppWebService:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: !Sub smartcare-app-web-${Environment}
      SourceConfiguration:
        AuthenticationConfiguration:
          AccessRoleArn: !GetAtt AppRunnerECRAccessRole.Arn
        AutoDeploymentsEnabled: true
        ImageRepository:
          ImageIdentifier: !Ref AppWebImageUri
          ImageRepositoryType: ECR
          ImageConfiguration:
            Port: '8080'
            RuntimeEnvironmentVariables:
              SPRING_PROFILES_ACTIVE: aws
              RDS_ENDPOINT: !Ref RdsEndpoint
              RDS_PASSWORD: !Ref RdsPassword
              RDS_DB_NAME: agenticcare
              SQS_WORKFLOW_EVENTS: !Ref SqsWorkflowEventsUrl
              SQS_OUTREACH_RESULTS: !Ref SqsOutreachResultsUrl
              SQS_ADMIN_ALERTS: !Ref SqsAdminAlertsUrl
              OPENSEARCH_ENDPOINT: !Ref OpenSearchEndpoint
              AWS_REGION: !Ref AWS::Region
      InstanceConfiguration:
        Cpu: '1024'
        Memory: '2048'
        InstanceRoleArn: !GetAtt AppRunnerInstanceRole.Arn
      HealthCheckConfiguration:
        Protocol: HTTP
        Path: /actuator/health
        Interval: 20
        Timeout: 5
        HealthyThreshold: 1
        UnhealthyThreshold: 5
      AutoScalingConfigurationArn: !Ref AutoScalingConfig
      NetworkConfiguration:
        EgressConfiguration:
          EgressType: VPC
          VpcConnectorArn: !Ref VpcConnector
      Tags:
        - Key: Project
          Value: SmartCare
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: AppRunner

  BrokerService:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: !Sub smartcare-broker-${Environment}
      SourceConfiguration:
        AuthenticationConfiguration:
          AccessRoleArn: !GetAtt AppRunnerECRAccessRole.Arn
        AutoDeploymentsEnabled: true
        ImageRepository:
          ImageIdentifier: !Ref BrokerImageUri
          ImageRepositoryType: ECR
          ImageConfiguration:
            Port: '8081'
            RuntimeEnvironmentVariables:
              SPRING_PROFILES_ACTIVE: aws
              RDS_ENDPOINT: !Ref RdsEndpoint
              RDS_PASSWORD: !Ref RdsPassword
              RDS_DB_NAME: agenticcare_broker
              AWS_REGION: !Ref AWS::Region
      InstanceConfiguration:
        Cpu: '1024'
        Memory: '2048'
        InstanceRoleArn: !GetAtt AppRunnerInstanceRole.Arn
      HealthCheckConfiguration:
        Protocol: HTTP
        Path: /actuator/health
        Interval: 20
        Timeout: 5
      AutoScalingConfigurationArn: !Ref AutoScalingConfig
      NetworkConfiguration:
        EgressConfiguration:
          EgressType: VPC
          VpcConnectorArn: !Ref VpcConnector
      Tags:
        - Key: Project
          Value: SmartCare
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: AppRunner

Outputs:
  AppWebServiceUrl:
    Value: !GetAtt AppWebService.ServiceUrl
    Export:
      Name: !Sub smartcare-${Environment}-apprunner-web-url
  BrokerServiceUrl:
    Value: !GetAtt BrokerService.ServiceUrl
    Export:
      Name: !Sub smartcare-${Environment}-apprunner-broker-url
