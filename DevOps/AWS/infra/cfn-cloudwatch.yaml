AWSTemplateFormatVersion: '2010-09-09'
Description: >
  SmartCare - CloudWatch observability: log groups (Standard + Infrequent Access),
  dashboard, alarms for Lambda/SQS, SNS alarm topic.

Parameters:
  Environment:
    Type: String
    Default: dev

Resources:
  # ================================================================
  # NOTE: Lambda and Step Functions log groups are NOT managed here.
  # They are auto-created by the services themselves. This template
  # only creates custom audit log groups that don't exist elsewhere.
  # ================================================================

  # ================================================================
  # Log Groups — Infrequent Access class (audit, forensic analysis)
  # ================================================================
  OutreachAuditLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /smartcare/audit/outreach-decisions-${Environment}
      LogGroupClass: INFREQUENT_ACCESS
      RetentionInDays: 2557
      Tags:
        - Key: Purpose
          Value: HIPAA-Audit-Trail
        - Key: Project
          Value: SmartCare
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: CloudWatch

  DataProtectionAuditLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /smartcare/audit/data-protection-findings-${Environment}
      LogGroupClass: INFREQUENT_ACCESS
      RetentionInDays: 2557
      Tags:
        - Key: Purpose
          Value: Data-Protection-Audit
        - Key: Project
          Value: SmartCare
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: CloudWatch

  # ================================================================
  # NOTE: Data Protection Policy and Field Index Policy are account-
  # level resources (AWS::Logs::AccountPolicy). Deploy them separately
  # via AWS CLI after this stack is created:
  #
  #   aws logs put-account-policy --policy-name smartcare-data-protection \
  #     --policy-type DATA_PROTECTION_POLICY --policy-document file://data-protection-policy.json --scope ALL
  #
  #   aws logs put-account-policy --policy-name smartcare-field-indexes \
  #     --policy-type FIELD_INDEX_POLICY --policy-document '{"Fields":["context_state","risk_score","channel","agent","action","patient_id","appointment_id","status"]}' --scope ALL
  # ================================================================

  # ================================================================
  # SNS Topic for Alarms
  # ================================================================
  AlarmNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub smartcare-cloudwatch-alarms-${Environment}
      Tags:
        - Key: Project
          Value: SmartCare
        - Key: Environment
          Value: !Ref Environment
        - Key: Component
          Value: CloudWatch

  # ================================================================
  # Lambda Error Alarms
  # ================================================================
  PCAErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub smartcare-pca-errors-${Environment}
      AlarmDescription: PCA Lambda errors exceed threshold
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Sub smartcare-pca-${Environment}
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmNotificationTopic

  COAErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub smartcare-coa-errors-${Environment}
      AlarmDescription: COA Lambda errors exceed threshold
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Sub smartcare-coa-${Environment}
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmNotificationTopic

  # ================================================================
  # SQS DLQ Alarms
  # ================================================================
  WorkflowEventsDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub smartcare-workflow-events-dlq-${Environment}
      AlarmDescription: Messages landing in workflow events dead-letter queue
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !Sub smartcare-workflow-events-dlq-${Environment}
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmNotificationTopic

  OutreachResultsDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub smartcare-outreach-results-dlq-${Environment}
      AlarmDescription: Messages landing in outreach results dead-letter queue
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !Sub smartcare-outreach-results-dlq-${Environment}
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmNotificationTopic

  # ================================================================
  # Dashboard
  # ================================================================
  SmartCareDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub SmartCare-${Environment}
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Invocations (All Agents)",
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "smartcare-pca-${Environment}", {"label": "PCA"}],
                  ["...", "smartcare-coa-${Environment}", {"label": "COA"}],
                  ["...", "smartcare-psa-${Environment}", {"label": "PSA"}],
                  ["...", "smartcare-rra-${Environment}", {"label": "RRA"}],
                  ["...", "smartcare-aca-${Environment}", {"label": "ACA"}]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Errors (All Agents)",
                "metrics": [
                  ["AWS/Lambda", "Errors", "FunctionName", "smartcare-pca-${Environment}", {"label": "PCA"}],
                  ["...", "smartcare-coa-${Environment}", {"label": "COA"}],
                  ["...", "smartcare-psa-${Environment}", {"label": "PSA"}],
                  ["...", "smartcare-rra-${Environment}", {"label": "RRA"}],
                  ["...", "smartcare-aca-${Environment}", {"label": "ACA"}]
                ],
                "period": 300,
                "stat": "Sum",
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Duration (p99)",
                "metrics": [
                  ["AWS/Lambda", "Duration", "FunctionName", "smartcare-pca-${Environment}", {"label": "PCA", "stat": "p99"}],
                  ["...", "smartcare-coa-${Environment}", {"label": "COA", "stat": "p99"}]
                ],
                "period": 300,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "SQS Queue Depth",
                "metrics": [
                  ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "smartcare-workflow-events-${Environment}", {"label": "Workflow Events"}],
                  ["...", "smartcare-outreach-results-${Environment}", {"label": "Outreach Results"}],
                  ["...", "smartcare-admin-alerts-${Environment}", {"label": "Admin Alerts"}]
                ],
                "period": 60,
                "stat": "Average",
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 12, "width": 12, "height": 6,
              "properties": {
                "title": "SQS Dead-Letter Queue Depth",
                "metrics": [
                  ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "smartcare-workflow-events-dlq-${Environment}", {"label": "Workflow DLQ"}],
                  ["...", "smartcare-outreach-results-dlq-${Environment}", {"label": "Outreach DLQ"}],
                  ["...", "smartcare-admin-alerts-dlq-${Environment}", {"label": "Admin DLQ"}]
                ],
                "period": 60,
                "stat": "Average",
                "region": "${AWS::Region}"
              }
            }
          ]
        }

  DashboardUrlParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /smartcare/${Environment}/cloudwatch-dashboard-url
      Type: String
      Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=SmartCare-${Environment}

Outputs:
  DashboardName:
    Value: !Sub SmartCare-${Environment}
    Export:
      Name: !Sub smartcare-${Environment}-cloudwatch-dashboard
  DashboardUrl:
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=SmartCare-${Environment}
  AlarmTopicArn:
    Value: !Ref AlarmNotificationTopic
    Export:
      Name: !Sub smartcare-${Environment}-alarm-topic
  AuditLogGroupName:
    Value: !Ref OutreachAuditLogGroup
    Description: Outreach audit trail log group (IA class, 7-year retention)
  DataProtectionAuditLogGroupName:
    Value: !Ref DataProtectionAuditLogGroup
    Description: Data protection findings log group (IA class)
